services:
  promptforge-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: promptforge-api:latest
    container_name: promptforge-api
    network_mode: host
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: ${PROMPTFIX_BIND_URL:-http://127.0.0.1:5064}
      OLLAMA__BASEURL: http://127.0.0.1:11434
      OLLAMA__MODEL: qwen3.5:2b
      OLLAMA__TIMEOUTSECONDS: 180
      OLLAMA__NUMCONTEXT: 1024
      OLLAMA__NUMPREDICT: 140
      OLLAMA__TOPP: 0.8
      OLLAMA__KEEPALIVE: 10m
